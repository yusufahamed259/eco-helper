<!DOCTYPE html>
<html>
<head>
<title>Eco Helper Pro</title>

<style>
body {
  font-family: Arial;
  background: #121212;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.container {
  background: #1e1e1e;
  padding: 20px;
  border-radius: 20px;
  width: 320px;
  text-align: center;
}

input {
  padding: 10px;
  margin: 8px;
  width: 90%;
  border-radius: 10px;
  border: none;
}

button {
  padding: 10px;
  margin: 8px;
  width: 95%;
  border-radius: 10px;
  border: none;
  background: green;
  color: white;
}

.hidden {
  display: none;
}
</style>

</head>

<body>

<!-- LOGIN PAGE -->
<div id="loginPage" class="container">
  <h2>🔐 Login</h2>
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  
  <button onclick="login()">Login</button>
  <button onclick="signup()">Sign Up</button>

  <p id="loginMsg"></p>
</div>

<!-- APP PAGE -->
<div id="appPage" class="container hidden">
  <h2>🌍 Eco Helper</h2>

  <input id="water" type="number" placeholder="Water (liters)">
  <input id="electricity" type="number" placeholder="Electricity (units)">

  <button onclick="saveData()">Save Entry</button>
  <button onclick="logout()">Logout</button>

  <h3 id="score"></h3>
  <div id="history"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// SIGN UP
function signup() {
  let email = document.getElementById("username").value;
  let pass = document.getElementById("password").value;

  auth.createUserWithEmailAndPassword(email, pass)
    .then(() => alert("Account created!"))
    .catch(err => alert(err.message));
}

// LOGIN
function login() {
  let email = document.getElementById("username").value;
  let pass = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, pass)
    .then(() => {
      document.getElementById("loginPage").classList.add("hidden");
      document.getElementById("appPage").classList.remove("hidden");
    })
    .catch(err => alert("Login failed"));
}
</script>
</body>
</html>
