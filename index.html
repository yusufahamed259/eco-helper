<!DOCTYPE html>
<html>
<head>
<title>Eco Helper Pro</title>

<style>
body {
  font-family: Arial;
  background: #121212;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.container {
  background: #1e1e1e;
  padding: 20px;
  border-radius: 20px;
  width: 320px;
  text-align: center;
}

input {
  padding: 10px;
  margin: 8px;
  width: 90%;
  border-radius: 10px;
  border: none;
}

button {
  padding: 10px;
  margin: 8px;
  width: 95%;
  border-radius: 10px;
  border: none;
  background: green;
  color: white;
}

.hidden {
  display: none;
}
</style>

</head>

<body>

<!-- LOGIN PAGE -->
<div id="loginPage" class="container">
  <h2>🔐 Login</h2>
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  
  <button onclick="login()">Login</button>
  <button onclick="signup()">Sign Up</button>

  <p id="loginMsg"></p>
</div>

<!-- APP PAGE -->
<div id="appPage" class="container hidden">
  <h2>🌍 Eco Helper</h2>

  <input id="water" type="number" placeholder="Water (liters)">
  <input id="electricity" type="number" placeholder="Electricity (units)">

  <button onclick="saveData()">Save Entry</button>
  <button onclick="logout()">Logout</button>

  <h3 id="score"></h3>
  <div id="history"></div>
</div>

<script>
// LOGIN SYSTEM
function signup() {
  let user = document.getElementById("username").value;
  let pass = document.getElementById("password").value;

  if (!user || !pass) return;

  localStorage.setItem("user", user);
  localStorage.setItem("pass", pass);

  document.getElementById("loginMsg").innerText = "✅ Account created!";
}

function login() {
  let user = document.getElementById("username").value;
  let pass = document.getElementById("password").value;

  let savedUser = localStorage.getItem("user");
  let savedPass = localStorage.getItem("pass");

  if (user === savedUser && pass === savedPass) {
    document.getElementById("loginPage").classList.add("hidden");
    document.getElementById("appPage").classList.remove("hidden");
    showData();
  } else {
    document.getElementById("loginMsg").innerText = "❌ Wrong login!";
  }
}

function logout() {
  location.reload();
}

// ECO APP DATA
let data = JSON.parse(localStorage.getItem("ecoData")) || [];

function saveData() {
  let water = Number(document.getElementById("water").value);
  let elec = Number(document.getElementById("electricity").value);

  if (!water || !elec) return;

  let entry = { water, elec };
  data.push(entry);

  localStorage.setItem("ecoData", JSON.stringify(data));

  showData();
}

function showData() {
  let historyDiv = document.getElementById("history");
  historyDiv.innerHTML = "";

  let score = 0;

  data.forEach(entry => {
    historyDiv.innerHTML += `<p>💧 ${entry.water}L | ⚡ ${entry.elec}</p>`;

    if (entry.water <= 100) score++;
    if (entry.elec <= 10) score++;
  });

  document.getElementById("score").innerText = "🏆 Eco Score: " + score;
}
</script>

</body>
</html>
