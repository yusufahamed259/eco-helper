<!DOCTYPE html>
<html>
<head>
<title>Eco Helper Pro</title>
<link rel="manifest" href="manifest.json">
<style>
body {
  font-family: Arial;
  background: #121212;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.container {
  background: #1e1e1e;
  padding: 20px;
  border-radius: 20px;
  width: 320px;
  text-align: center;
}

input {
  padding: 10px;
  margin: 8px;
  width: 90%;
  border-radius: 10px;
  border: none;
}

button {
  padding: 10px;
  margin: 8px;
  width: 95%;
  border-radius: 10px;
  border: none;
  background: green;
  color: white;
  font-size: 15px;
}

.bar {
  height: 10px;
  margin: 5px 0;
  border-radius: 5px;
}

.waterBar {
  background: blue;
}

.elecBar {
  background: orange;
}
</style>

</head>

<body>

<div class="container">
  <h2>🌍 Eco Helper Pro</h2>

  <input id="water" type="number" placeholder="Water (liters)">
  <input id="electricity" type="number" placeholder="Electricity (units)">

  <button onclick="saveData()">Save Entry</button>

  <h3 id="score"></h3>
  <div id="history"></div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("ecoData")) || [];

function saveData() {
  let water = Number(document.getElementById("water").value);
  let elec = Number(document.getElementById("electricity").value);

  if (!water || !elec) return;

  let entry = { water, elec };
  data.push(entry);

  localStorage.setItem("ecoData", JSON.stringify(data));

  showData();
}

function showData() {
  let historyDiv = document.getElementById("history");
  historyDiv.innerHTML = "";

  let score = 0;

  data.forEach(entry => {
    let wBar = `<div class="bar waterBar" style="width:${entry.water}px"></div>`;
    let eBar = `<div class="bar elecBar" style="width:${entry.elec * 10}px"></div>`;

    historyDiv.innerHTML += `
      <p>💧 ${entry.water}L | ⚡ ${entry.elec}</p>
      ${wBar}
      ${eBar}
    `;

    if (entry.water <= 100) score++;
    if (entry.elec <= 10) score++;
  });

  document.getElementById("score").innerText = "🏆 Eco Score: " + score;
}

showData();
</script>

</body>
</html>
